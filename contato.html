    <div class="boxFormulario">
                
        <form method="post" id="FContato" action="mailto:empresaX@gmail.com">
            <p> 
            <label for="cNome"> Nome: </label> <br>
            <input type="text" name="tNome" id="cNome" size="40" maxlength="30" autofocus required />
            </p> 


            <p>
            <label for="cRua">Endereço:</label> <br>
            <input type="text" name="tRua" id="cRua" size="40" maxlength="50"  placeholder="Rua, Av, Trav,..." required />
            </p>

            <p>
            <label for="cTel">Telefone:</label> <br>
            <input type="tel" name="tTel" id="cTel" size="40" maxlength="30"  required />
            </p>
                
            <p>
            <label for="cMail">E-mail:</label> <br>
            <input type="email" name="tMail" id="cMail" size="40" maxlength="30"  required />
            </p>       
            
            <p>
            <label for="cMsg">Mensagem:</label> <br>
            <textarea name="tMsg" id="cMsg" cols="40" rows="5" placeholder="Deixe aqui sua mensagem">
            </textarea>  
            </p>
            
            <input type="submit" name="Enviar" class="botaoFormulario" style="padding:10px 15px 10px 15px; border-radius:10px;border-color: #ffffff;" /> 
            <input type="reset" value="Cancelar" name="Cancelar" class="botaoFormulario" style="padding:10px 15px 10px 15px; border-radius:10px;border-color: #ffffff;" /> 
        
        </form> 

    </div>
